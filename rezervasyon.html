<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rezervasyon - Su Sporları Merkezi</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/sidebar.css" />
    <link rel="stylesheet" href="css/rezervasyon.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      crossorigin="anonymous"
    />
  </head>
  <body class="with-sidebar">
    <div id="sidebar-container"></div>

    <div class="main-content">
      <header class="main-header">
        <div class="container">
          <img src="images/logo.jpg" class="logo" />
          <h1 class="header-title">Ansal WindSurf</h1>
        </div>
      </header>

      <main class="container">
        <section class="reservation-section">
          <h2>Rezervasyon Formu</h2>
          <div class="form-container">
            <form id="reservationForm" class="reservation-form">
              <div class="form-group">
                <label for="name">Ad Soyad:</label>
                <input type="text" id="name" name="name" required />
              </div>

              <div class="form-group">
                <label for="email">E-posta:</label>
                <input type="email" id="email" name="email" required />
              </div>

              <div class="form-group">
                <label for="phone">Telefon:</label>
                <input
                  type="tel"
                  id="phone"
                  name="phone"
                  required
                  placeholder="5xx xxx xx xx"
                />
              </div>

              <div class="form-group">
                <label for="branch">Branş:</label>
                <select id="branch" name="branch" required>
                  <option value="">Seçiniz</option>
                  <option value="kano">Kano</option>
                  <option value="surf">WindSurf</option>
                  <option value="sup">SUP</option>
                </select>
              </div>

              <div class="form-group">
                <label for="date">Tarih:</label>
                <input type="date" id="date" name="date" required />
                <small class="date-info"
                  >Bugünden itibaren 15 gün içerisindeki bir tarih
                  seçebilirsiniz.</small
                >
              </div>

              <div class="form-group">
                <label for="time">Saat:</label>
                <select id="time" name="time" required>
                  <option value="">Seçiniz</option>
                </select>
                <small class="time-info">10:00 - 19:00 arası seanslar</small>
              </div>

              <div class="form-group">
                <label for="participants">Katılımcı Sayısı:</label>
                <input
                  type="number"
                  id="participants"
                  name="participants"
                  min="1"
                  max="10"
                  required
                />
              </div>

              <div class="form-group">
                <label for="message">Ek Not:</label>
                <textarea
                  id="message"
                  name="message"
                  rows="4"
                  placeholder="Varsa özel isteklerinizi yazabilirsiniz..."
                ></textarea>
              </div>

              <div class="form-group">
                <button type="submit" class="submit-btn">
                  Rezervasyon Yap <i class="arrow">→</i>
                </button>
              </div>
            </form>

            <div
              id="successMessage"
              class="success-message"
              style="display: none"
            >
              <h3>Rezervasyonunuz Alındı!</h3>
              <p>En kısa sürede sizinle iletişime geçeceğiz.</p>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
      (function () {
        emailjs.init("qBUYsYPoU0SgiRQln");
      })();
    </script>
    <script src="js/reservation.js"></script>
  </body>
</html>
