<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rezervasyon - Su Sporları Merkezi</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Montserrat:400,700&display=swap"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/sidebar.css" />
    <link rel="stylesheet" href="css/rezervasyon.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div id="sidebar-container"></div>
    <div class="rez-logo-bar">
      <div class="rez-logo-circle">
        <img src="images/logo.jpg" alt="Ansal WindSurf Logo" />
      </div>
      <span class="rez-logo-title">Ansal WindSurf</span>
    </div>
    <div class="rez-bg-overlay">
      <div class="rez-visual-full"></div>
      <div class="rez-card-floating">
        <h2>Rezervasyon Formu</h2>
        <form id="reservationForm" class="rez-form">
          <div class="rez-field">
            <input
              type="text"
              id="name"
              name="name"
              required
              placeholder="Ad Soyad"
            />
          </div>
          <div class="rez-field">
            <input
              type="email"
              id="email"
              name="email"
              required
              placeholder="E-posta"
            />
          </div>
          <div class="rez-field">
            <input
              type="tel"
              id="phone"
              name="phone"
              required
              placeholder="Telefon (5xx xxx xx xx)"
            />
          </div>
          <div class="rez-field">
            <select id="branch" name="branch" required class="custom-select">
              <option value="">Branş Seçiniz</option>
              <option value="Kano">🛶 Kano</option>
              <option value="Surf">🌊 WindSurf</option>
              <option value="Sup">🏄 SUP</option>
            </select>
          </div>
          <div class="rez-row">
            <div class="rez-field">
              <input type="date" id="date" name="date" required />
            </div>
            <div class="rez-field">
              <select id="time" name="time" required>
                <option value="">Saat Seçiniz</option>
              </select>
            </div>
          </div>
          <div class="rez-field">
            <input
              type="number"
              id="participants"
              name="participants"
              min="1"
              max="10"
              required
              placeholder="Katılımcı Sayısı"
            />
          </div>
          <div class="rez-field">
            <textarea
              id="message"
              name="message"
              rows="2"
              placeholder="Ek Not (isteğe bağlı)"
            ></textarea>
          </div>
          <button type="submit" class="rez-btn">
            <span>Rezervasyon Yap</span> <i class="fas fa-arrow-right"></i>
          </button>
        </form>
        <div id="successMessage" class="rez-success" style="display: none">
          <div class="rez-success-icon"><i class="fas fa-check"></i></div>
          <h3>Rezervasyonunuz Alındı!</h3>
          <p>En kısa sürede sizinle iletişime geçeceğiz.</p>
          <div class="rez-success-details rez-success-details-modern">
            <div class="rez-success-row"><span id="successBranch"></span></div>
            <div class="rez-success-row"><span id="successDate"></span></div>
            <div class="rez-success-row"><span id="successTime"></span></div>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
      (function () {
        emailjs.init("9hJs-Ce03kKKXG3hB");
      })();
    </script>
    <script src="js/reservation.js"></script>
  </body>
</html>
